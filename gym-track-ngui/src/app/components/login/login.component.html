<div class="container">
  <div class="logo">
    <i class="fas fa-dumbbell"></i>
  </div>

  <h1>GymTrack</h1>
  <p>Sign in to your account</p>

  <form (ngSubmit)="onLogin()">
    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="admin@gymtrack.com" [(ngModel)]="loginData.email" name="email" required />
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="********" [(ngModel)]="loginData.password" name="password" required />
    </div>

    <button type="submit" class="btn">Sign in</button>
  </form>

  <div class="footer">
    Don't have an account?
    <a [routerLink]="['/register']">Register</a>
  </div>
</div>
